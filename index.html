<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="controls">
    <h1>Wave Visualizer</h1>

    <!-- Main -->
    <div class="section">
      <span class="section-title">Main</span>

      <div class="control-row">
        <div class="control-label"><span>waveType</span></div>
        <select id="ctrl-waveType">
          <option value="sine">sine</option>
          <option value="square">square</option>
          <option value="triangle">triangle</option>
          <option value="sawtooth">sawtooth</option>
        </select>
      </div>

      <div class="control-row">
        <div class="control-label">
          <span>frequency</span>
          <span class="control-value" id="val-frequency"></span>
        </div>
        <input type="range" id="ctrl-frequency" min="0.5" max="10" step="0.1">
      </div>

      <div class="control-row">
        <div class="control-label">
          <span>amplitude</span>
          <span class="control-value" id="val-amplitude"></span>
        </div>
        <input type="range" id="ctrl-amplitude" min="0.05" max="1" step="0.01">
      </div>

      <div class="control-row">
        <div class="control-label">
          <span>strokeWidth</span>
          <span class="control-value" id="val-strokeWidth"></span>
        </div>
        <input type="range" id="ctrl-strokeWidth" min="0.1" max="50" step="0.1">
      </div>
    </div>

    <!-- FM -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">FM</span>
        <input type="checkbox" id="ctrl-fm-enabled">
      </div>
      <div class="section-controls" id="fm-controls">
        <div class="control-row">
          <div class="control-label">
            <span>ratio</span>
            <span class="control-value" id="val-fm-ratio"></span>
          </div>
          <input type="range" id="ctrl-fm-ratio" min="0.5" max="7" step="0.1">
        </div>
        <div class="control-row">
          <div class="control-label">
            <span>depth</span>
            <span class="control-value" id="val-fm-depth"></span>
          </div>
          <input type="range" id="ctrl-fm-depth" min="0" max="2" step="0.05">
        </div>
      </div>
    </div>

    <!-- Fold -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Fold</span>
        <input type="checkbox" id="ctrl-fold-enabled">
      </div>
      <div class="section-controls" id="fold-controls">
        <div class="control-row">
          <div class="control-label">
            <span>threshold</span>
            <span class="control-value" id="val-fold-threshold"></span>
          </div>
          <input type="range" id="ctrl-fold-threshold" min="0.1" max="1" step="0.01">
        </div>
        <div class="control-row">
          <div class="control-label">
            <span>iterations</span>
            <span class="control-value" id="val-fold-iterations"></span>
          </div>
          <input type="range" id="ctrl-fold-iterations" min="1" max="8" step="1">
        </div>
      </div>
    </div>

    <!-- AM -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">AM</span>
        <input type="checkbox" id="ctrl-am-enabled">
      </div>
      <div class="section-controls" id="am-controls">
        <div class="control-row">
          <div class="control-label">
            <span>rate</span>
            <span class="control-value" id="val-am-rate"></span>
          </div>
          <input type="range" id="ctrl-am-rate" min="0.1" max="6" step="0.05">
        </div>
        <div class="control-row">
          <div class="control-label">
            <span>depth</span>
            <span class="control-value" id="val-am-depth"></span>
          </div>
          <input type="range" id="ctrl-am-depth" min="0" max="1" step="0.01">
        </div>
        <div class="control-row">
          <div class="control-label"><span>shape</span></div>
          <select id="ctrl-am-shape">
            <option value="sine">sine</option>
            <option value="triangle">triangle</option>
            <option value="sawtooth">sawtooth</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Waveshaper -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Waveshaper</span>
        <input type="checkbox" id="ctrl-ws-enabled">
      </div>
      <div class="section-controls" id="ws-controls">
        <div class="control-row">
          <div class="control-label"><span>curve</span></div>
          <select id="ctrl-ws-curve">
            <option value="tanh">tanh (soft sat)</option>
            <option value="hardclip">hard clip</option>
            <option value="tube">tube (x - x³/3)</option>
          </select>
        </div>
        <div class="control-row">
          <div class="control-label">
            <span>drive</span>
            <span class="control-value" id="val-ws-drive"></span>
          </div>
          <input type="range" id="ctrl-ws-drive" min="1" max="10" step="0.1">
        </div>
      </div>
    </div>

    <!-- ADSR -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">ADSR</span>
        <input type="checkbox" id="ctrl-adsr-enabled">
      </div>
      <div class="section-controls" id="adsr-controls">
        <div class="control-row">
          <div class="control-label">
            <span>attack</span>
            <span class="control-value" id="val-adsr-attack"></span>
          </div>
          <input type="range" id="ctrl-adsr-attack" min="0" max="1" step="0.01">
        </div>
        <div class="control-row">
          <div class="control-label">
            <span>decay</span>
            <span class="control-value" id="val-adsr-decay"></span>
          </div>
          <input type="range" id="ctrl-adsr-decay" min="0" max="1" step="0.01">
        </div>
        <div class="control-row">
          <div class="control-label">
            <span>sustain</span>
            <span class="control-value" id="val-adsr-sustain"></span>
          </div>
          <input type="range" id="ctrl-adsr-sustain" min="0" max="1" step="0.01">
        </div>
        <div class="control-row">
          <div class="control-label">
            <span>release</span>
            <span class="control-value" id="val-adsr-release"></span>
          </div>
          <input type="range" id="ctrl-adsr-release" min="0" max="1" step="0.01">
        </div>
      </div>
    </div>
  </div>

  <canvas id="scope"></canvas>

  <div class="export-bar">
    <button id="btn-copy">Copy transparent PNG</button>
    <button id="btn-download">Download transparent PNG</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
